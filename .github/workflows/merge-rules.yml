name: Merge Check Rules

on:
  push:
    branches: [main]
    paths:
      - 'custom-domains.json'
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Merge upstream rules with custom domains
        run: node scripts/merge-rules.cjs
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add rules/detection-rules.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-merge upstream rules with custom domains"
            git push
          fi
